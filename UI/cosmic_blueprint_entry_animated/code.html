<style>
    body {
        background-color: #050510;
        overflow-x: hidden;
        color: #e3e0f3;
        margin: 0;
        padding: 0;
    }

    /* Celestial Environment */
    .celestial-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .nebula {
        position: absolute;
        top: 0;
        right: 0;
        width: 80%;
        height: 80%;
        background: radial-gradient(circle at top right, #1A0A3E 0%, transparent 70%);
        opacity: 0.6;
    }

    .star-layer {
        position: absolute;
        inset: -100px;
        background-repeat: repeat;
    }

    .stars-1 {
        background-image: radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
                          radial-gradient(1px 1px at 40px 70px, #ffffff, transparent),
                          radial-gradient(1px 1px at 50px 160px, #ffffff, transparent),
                          radial-gradient(1px 1px at 80px 120px, #ffffff, transparent),
                          radial-gradient(1px 1px at 110px 10px, #ffffff, transparent),
                          radial-gradient(1px 1px at 150px 200px, #ffffff, transparent);
        background-size: 200px 200px;
        animation: drift 60s linear infinite;
    }

    .stars-2 {
        background-image: radial-gradient(1.5px 1.5px at 100px 100px, #ffffff, transparent),
                          radial-gradient(1.5px 1.5px at 200px 300px, #ffffff, transparent),
                          radial-gradient(1.5px 1.5px at 400px 400px, #ffffff, transparent),
                          radial-gradient(1.5px 1.5px at 50px 500px, #ffffff, transparent);
        background-size: 600px 600px;
        opacity: 0.7;
        animation: drift 120s linear infinite;
    }

    .stars-3 {
        background-image: radial-gradient(2px 2px at 300px 300px, #ffffff, transparent),
                          radial-gradient(2px 2px at 800px 600px, #ffffff, transparent);
        background-size: 1000px 1000px;
        opacity: 0.5;
        animation: drift 180s linear infinite;
    }

    @keyframes drift {
        from { transform: translateY(0); }
        to { transform: translateY(-200px); }
    }

    .sri-yantra-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80vh;
        height: 80vh;
        opacity: 0.03;
        z-index: 1;
        pointer-events: none;
    }

    .glass-card {
        background: #111130;
        border: 1px solid #1E1E4A;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }

    .glass-card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 40px rgba(212, 175, 55, 0.08);
    }

    .stellar-divider {
        height: 1px;
        width: 100%;
        background: linear-gradient(90deg, transparent, #1E1E4A, transparent);
        margin: 24px 0;
    }

    .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
    }

    .text-gold-gradient {
        background: linear-gradient(135deg, #D4AF37 0%, #F0D060 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .btn-gold {
        background: linear-gradient(135deg, #D4AF37 0%, #F0D060 100%);
        transition: all 0.3s ease;
    }

    .btn-gold:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }

    input:focus {
        outline: none;
        border-color: #D4AF37 !important;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    @keyframes constellationRotate {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    .constellation-icon {
        animation: constellationRotate 20s linear infinite;
    }
</style>
</head>
<body class="font-body-md text-body-md">
<!-- Background Elements -->
<div class="celestial-bg">
<div class="nebula"></div>
<div class="star-layer stars-1"></div>
<div class="star-layer stars-2"></div>
<div class="star-layer stars-3"></div>
</div>
<div class="sri-yantra-overlay">
<svg class="w-full h-full text-on-surface fill-current" viewbox="0 0 100 100">
<!-- Simplified Sri Yantra representation for faint background -->
<path d="M50 5 L95 82 L5 82 Z" fill="none" stroke="currentColor" stroke-width="0.2"></path>
<path d="M50 95 L5 18 L95 18 Z" fill="none" stroke="currentColor" stroke-width="0.2"></path>
<circle cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="0.1"></circle>
<circle cx="50" cy="50" fill="none" r="40" stroke="currentColor" stroke-width="0.1"></circle>
<path d="M50 20 L80 70 L20 70 Z" fill="none" stroke="currentColor" stroke-width="0.2"></path>
<path d="M50 80 L20 30 L80 30 Z" fill="none" stroke="currentColor" stroke-width="0.2"></path>
</svg>
</div>
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-container-margin py-10">
<!-- Central Birth Data Card -->
<div class="glass-card w-full max-w-[480px] rounded-card p-10 flex flex-col items-center">
<!-- Brand Section -->
<div class="text-center mb-8">
<div class="constellation-icon mb-4 inline-block">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
                    auto_awesome
                </span>
</div>
<h1 class="font-display-md text-display-md text-gold-gradient tracking-[0.1em] mb-1">
                ✦ TRIKAL DARSHI ✦
            </h1>
<p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant">
                Vedic Jyotish • Lal Kitab • Numerology
            </p>
</div>
<!-- Form -->
<form class="w-full space-y-6" onsubmit="return false">
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant/80 ml-1">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full bg-[#0D0D2B] border border-[#1E1E4A] rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant/50 transition-all font-body-md" placeholder="Arjun Sharma" type="text"/>
</div>
</div>
<!-- Date of Birth -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant/80 ml-1">DATE OF BIRTH</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">calendar_month</span>
<input class="w-full bg-[#0D0D2B] border border-[#1E1E4A] rounded-xl py-3.5 pl-12 pr-4 text-on-surface transition-all [color-scheme:dark] font-body-md" type="date"/>
</div>
</div>
<!-- Time of Birth & Confidence -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant/80">TIME OF BIRTH</label>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">schedule</span>
<input class="w-full bg-[#0D0D2B] border border-[#1E1E4A] rounded-xl py-3.5 pl-12 pr-4 text-on-surface transition-all [color-scheme:dark] font-body-md" type="time"/>
</div>
<!-- Confidence Pill Selector -->
<div class="flex bg-[#0D0D2B] p-1 rounded-full border border-[#1E1E4A] gap-1">
<button class="confidence-btn flex-1 py-1.5 rounded-full text-[10px] font-bold transition-all bg-primary-container/20 text-primary border border-primary/20" onclick="selectConfidence(this)" type="button">EXACT</button>
<button class="confidence-btn flex-1 py-1.5 rounded-full text-[10px] font-bold transition-all text-on-surface-variant hover:bg-surface-container-highest" onclick="selectConfidence(this)" type="button">APPROXIMATE</button>
<button class="confidence-btn flex-1 py-1.5 rounded-full text-[10px] font-bold transition-all text-on-surface-variant hover:bg-surface-container-highest" onclick="selectConfidence(this)" type="button">UNKNOWN</button>
</div>
</div>
</div>
<!-- City of Birth -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant/80 ml-1">CITY OF BIRTH</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">location_on</span>
<input class="w-full bg-[#0D0D2B] border border-[#1E1E4A] rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant/50 transition-all font-body-md" placeholder="Search city..." type="text"/>
</div>
</div>
<!-- Submit Button -->
<button class="btn-gold w-full py-5 rounded-xl font-display-md text-[14px] text-on-primary-fixed font-bold tracking-[0.15em] flex items-center justify-center gap-2 group mt-4" type="submit">
                GENERATE MY COSMIC BLUEPRINT
                <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">auto_graph</span>
</button>
</form>
<div class="stellar-divider"></div>
<!-- Muted Features Row -->
<div class="flex justify-between w-full px-2">
<div class="flex flex-col items-center gap-1.5 group cursor-help">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors text-[20px]">stars</span>
<span class="text-[10px] font-bold text-outline-variant tracking-wider uppercase font-accent-term">Vedic Jyotish</span>
</div>
<div class="flex flex-col items-center gap-1.5 group cursor-help">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors text-[20px]">menu_book</span>
<span class="text-[10px] font-bold text-outline-variant tracking-wider uppercase font-accent-term">Lal Kitab</span>
</div>
<div class="flex flex-col items-center gap-1.5 group cursor-help">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors text-[20px]">calculate</span>
<span class="text-[10px] font-bold text-outline-variant tracking-wider uppercase font-accent-term">Numerology</span>
</div>
</div>
</div>
<!-- Footnote -->
<p class="mt-8 text-on-surface-variant/40 font-label-sm text-[11px] tracking-widest text-center max-w-xs font-inter">
        SECURE &amp; ENCRYPTED BIRTH DATA PROCESSING FOR PRECISION ASTROLOGICAL CALCULATIONS
    </p>
</main>
<script>
    // Confidence selection logic
    function selectConfidence(btn) {
        document.querySelectorAll('.confidence-btn').forEach(b => {
            b.classList.remove('bg-primary-container/20', 'text-primary', 'border', 'border-primary/20');
            b.classList.add('text-on-surface-variant');
        });
        btn.classList.add('bg-primary-container/20', 'text-primary', 'border', 'border-primary/20');
        btn.classList.remove('text-on-surface-variant');
    }

    // Interactive mouse parallax for card
    const card = document.querySelector('.glass-card');
    document.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 80;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
        card.style.transform = `scale(1.02) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    document.addEventListener('mouseleave', () => {
        card.style.transform = `scale(1) rotateY(0deg) rotateX(0deg)`;
    });
</script>
</body></html>
